<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat-Amigos Chile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
    :root {
        --bg-dark: #0A0A0B;
        --violet: #7C3AED;
        --cyan: #06B6D4;
    }
    
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-dark);
        color: #fff;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
    }
    
    /* Background Gradient Orbs */
    body::before,
    body::after {
        content: '';
        position: fixed;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.25;
        z-index: 0;
        pointer-events: none;
        animation: float 20s ease-in-out infinite;
    }
    
    body::before {
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, var(--violet) 0%, transparent 70%);
        top: -200px;
        right: -100px;
        animation-delay: 0s;
    }
    
    body::after {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
        bottom: -150px;
        left: -100px;
        animation-delay: 10s;
    }
    
    @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
    }
    
    /* Glass Card */
    .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    
    /* Main Button */
    .chat-btn {
        position: relative;
        background: linear-gradient(135deg, var(--violet) 0%, #6D28D9 100%);
        box-shadow: 0 0 40px rgba(124, 58, 237, 0.4), 
                    0 10px 30px -10px rgba(124, 58, 237, 0.6),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        overflow: hidden;
        display: inline-block;
        text-decoration: none;
    }
    
    .chat-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.6s;
    }
    
    .chat-btn:hover::before {
        left: 100%;
    }
    
    .chat-btn:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 0 60px rgba(124, 58, 237, 0.6), 
                    0 15px 40px -10px rgba(124, 58, 237, 0.8),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }
    
    .chat-btn:active {
        transform: translateY(-1px) scale(1.01);
    }
    
    /* Glow Pulse Animation */
    @keyframes pulse-glow {
        0%, 100% { 
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.4), 
                       0 10px 30px -10px rgba(124, 58, 237, 0.6);
        }
        50% { 
            box-shadow: 0 0 60px rgba(124, 58, 237, 0.6), 
                       0 10px 40px -10px rgba(124, 58, 237, 0.8);
        }
    }
    
    .chat-btn {
        animation: pulse-glow 3s ease-in-out infinite;
    }
    
    /* Online Dot */
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.2); }
    }
    
    .online-dot {
        animation: pulse-dot 2s ease-in-out infinite;
    }
    
    /* Title Gradient */
    .title-gradient {
        background: linear-gradient(135deg, #fff 0%, #A78BFA 50%, #06B6D4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    @media (max-width: 640px) {
        body::before {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -100px;
        }
        
        body::after {
            width: 250px;
            height: 250px;
            bottom: -100px;
            left: -80px;
        }
    }
</style>
</head>
<body class="flex items-center justify-center p-4">
    <main class="relative z-10 w-full max-w-2xl mx-auto">
        <!-- Main Glass Container -->
        <div class="glass-card rounded-3xl p-8 sm:p-12 md:p-16 text-center">
            <!-- Logo / Title -->
            <div class="mb-8 sm:mb-12">
                <h1 class="title-gradient text-4xl sm:text-5xl md:text-6xl font-black tracking-tight leading-tight mb-3">
                    Chat Amigos Chile
                </h1>
                <div class="h-1 w-24 mx-auto bg-gradient-to-r from-violet-500 to-cyan-500 rounded-full opacity-50"></div>
            </div>
            
            <!-- Main CTA Button -->
            <div class="mb-6 sm:mb-8">
                <a 
                    href="chat.html"
                    id="chatBtn"
                    class="chat-btn w-full sm:w-auto text-white font-bold text-xl sm:text-2xl py-5 sm:py-6 px-12 sm:px-16 rounded-2xl cursor-pointer select-none"
                    aria-label="Entrar al chat de #puntodeencuentro2026">
                    Entra al Chat 
                </a>
            </div>
            
            <!-- Subtitle -->
            <p class="text-gray-400 text-sm sm:text-base font-medium tracking-wide mb-10 sm:mb-12">
                Radio Amigos 24/7
            </p>
            
            <!-- Divider -->
            <div class="h-px bg-gradient-to-r from-transparent via-white/10 to-transparent mb-6"></div>
            
            <!-- Footer Status -->
            <div class="flex items-center justify-center gap-2 text-gray-300 text-sm font-medium">
                <span class="online-dot w-2.5 h-2.5 bg-green-500 rounded-full"></span>
                <span>Online</span>
            </div>
        </div>
        
        <!-- Bottom Text -->
        <div class="mt-8 text-center">
            <p class="text-gray-500 text-xs sm:text-sm">
                @BarT Corporation
            </p>
        </div>
    </main>

    <script>
        // Efecto de ripple al hacer click
        document.getElementById('chatBtn').addEventListener('click', function(e) {
            const btn = e.currentTarget;
            const ripple = document.createElement('span');
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;
            
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.classList.add('ripple');
            
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
        
        // Estilo para el ripple
        const style = document.createElement('style');
        style.textContent = `
            .chat-btn .ripple {
                position: absolute;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.5);
                transform: scale(0);
                animation: ripple-effect 0.6s ease-out;
                pointer-events: none;
            }
            @keyframes ripple-effect {
                to {
                    transform: scale(2);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>

</body>
</html>
