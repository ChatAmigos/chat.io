<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio | Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0A0A0B;
        --bg-secondary: #111114;
        --glass: rgba(255, 255, 255, 0.04);
        --glass-border: rgba(255, 255, 255, 0.08);
        --violet: #7C3AED;
        --violet-light: #A78BFA;
        --violet-accent: #8B5CF6;
        --violet-dark: #6D28D9;
        --text: #EDEDED;
        --text-secondary: #A1A1AA;
        --radius: 16px;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        height: 100%;
        overflow-x: hidden;
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        position: relative;
    }

    body::before {
        content: '';
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at 20% 30%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 80% 70%, rgba(124, 58, 237, 0.1) 0%, transparent 50%);
        z-index: -1;
        animation: gradientMove 15s ease infinite;
    }

    @keyframes gradientMove {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        50% { transform: translate(-10%, -10%) rotate(5deg); }
    }

    .container {
        display: flex;
        height: 100vh;
        gap: 16px;
        padding: 16px;
        max-width: 1920px;
        margin: 0 auto;
    }

    .panel {
        background: var(--glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .panel-left {
        flex: 0 0 70%;
        position: relative;
    }

    .panel-right {
        flex: 0 0 calc(30% - 16px);
        padding: 24px;
        gap: 20px;
    }

    .chat-header {
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--glass-border);
        min-height: 80px;
        gap: 16px;
        flex-wrap: wrap;
    }

    .chat-brand {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .chat-brand svg {
        width: 32px;
        height: 32px;
        fill: var(--violet-accent);
        filter: drop-shadow(0 0 12px rgba(139, 92, 246, 0.4));
    }

    .chat-brand-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.5px;
    }

    .chat-content {
        flex: 1;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .chat-placeholder {
        text-align: center;
        padding: 40px;
        opacity: 0.6;
    }

    .chat-placeholder svg {
        width: 80px;
        height: 80px;
        margin-bottom: 16px;
        opacity: 0.3;
    }

    #chatFrame {
        width: 100%;
        height: 100%;
        border: none;
        display: none;
    }

    .btn {
        background: linear-gradient(135deg, var(--violet) 0%, var(--violet-dark) 100%);
        color: white;
        border: none;
        padding: 12px 28px;
        border-radius: 12px;
        font-family: 'Inter', sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
        position: relative;
        overflow: hidden;
        white-space: nowrap;
    }

    .btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: left 0.5s;
    }

    .btn:hover::before {
        left: 100%;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 30px rgba(124, 58, 237, 0.5);
    }

    .btn:active {
        transform: translateY(0);
    }

    .btn-secondary {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        box-shadow: none;
    }

    .btn-secondary:hover {
        background: rgba(124, 58, 237, 0.1);
        border-color: var(--violet);
    }

    .btn-danger {
        background: linear-gradient(135deg, #DC2626 0%, #991B1B 100%);
        box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3);
    }

    .btn-danger:hover {
        box-shadow: 0 6px 30px rgba(220, 38, 38, 0.5);
    }

    .section {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 20px;
    }

    .section-title {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-secondary);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .section-title::before {
        content: '';
        width: 4px;
        height: 4px;
        background: var(--violet-light);
        border-radius: 50%;
        box-shadow: 0 0 8px var(--violet-light);
    }

    .now-playing {
        min-height: 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .track-artist {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 4px;
        line-height: 1.4;
    }

    .track-title {
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 1.4;
    }

    .loading-dots::after {
        content: '...';
        animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
        0%, 20% { content: ''; }
        40% { content: '.'; }
        60% { content: '..'; }
        80%, 100% { content: '...'; }
    }

    .player-controls {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 16px;
    }

    .play-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--violet) 0%, var(--violet-dark) 100%);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
        box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
        flex-shrink: 0;
    }

    .play-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 30px rgba(124, 58, 237, 0.5);
    }

    .play-btn svg {
        width: 20px;
        height: 20px;
        fill: white;
    }

    .player-info {
        flex: 1;
        min-width: 0;
    }

    .player-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .volume-control {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .volume-icon {
        width: 20px;
        height: 20px;
        fill: var(--text-secondary);
        flex-shrink: 0;
    }

    .volume-slider {
        -webkit-appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.1);
        outline: none;
        transition: var(--transition);
    }

    .volume-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--violet-light);
        cursor: pointer;
        box-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
        transition: var(--transition);
    }

    .volume-slider::-webkit-slider-thumb:hover {
        transform: scale(1.2);
    }

    .volume-slider::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--violet-light);
        cursor: pointer;
        border: none;
        box-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
        transition: var(--transition);
    }

    .hidden {
        display: none !important;
    }

    @media (max-width: 1024px) {
        .container {
            flex-direction: column;
        }

        .panel-left {
            flex: 1 1 auto;
            min-height: 60vh;
        }

        .panel-right {
            flex: 0 0 auto;
        }
    }

    @media (max-width: 768px) {
        .container {
            padding: 12px;
            gap: 12px;
        }

        .panel-right {
            padding: 16px;
            gap: 16px;
        }

        .chat-header {
            padding: 16px;
            min-height: 70px;
        }

        .chat-brand-title {
            font-size: 18px;
        }

        .chat-brand svg {
            width: 28px;
            height: 28px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 14px;
        }

        .section {
            padding: 16px;
        }
    }

    @media (max-width: 390px) {
        .player-controls {
            gap: 12px;
        }

        .play-btn {
            width: 44px;
            height: 44px;
        }

        .chat-brand-title {
            font-size: 16px;
        }

        .chat-header {
            gap: 12px;
        }
        
        .btn {
            padding: 10px 16px;
            font-size: 13px;
        }
    }
</style>
</head>
<body>
    <div class="container">
        <div class="panel panel-left">
            <div class="chat-header">
                <div class="chat-brand">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.08 2 11c0 2.06.83 3.94 2.2 5.4L3 22l4.93-2.6C9.11 19.8 10.51 20 12 20c5.52 0 10-4.08 10-9s-4.48-9-10-9zm1 13h-2v-2h2v2zm0-3h-2V7h2v5z"/>
                    </svg>
                    <span class="chat-brand-title">Chat Amigos Chile</span>
                </div>
                <button id="connectBtn" class="btn">Conectar al Chat</button>
            </div>
            <div class="chat-content" id="chatContent">
                <div id="chatPlaceholder" class="chat-placeholder">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
                    </svg>
                    <p>Presiona "Conectar" para unirte al chat</p>
                </div>
                <iframe id="chatFrame" allowfullscreen></iframe>
            </div>
        </div>

        <div class="panel panel-right">
            <div class="section">
                <div class="section-title">Ahora Suena</div>
                <div class="now-playing" id="nowPlaying">
                    <div class="track-artist loading-dots">Cargando</div>
                    <div class="track-title"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Reproductor</div>
                <div class="player-controls">
                    <button class="play-btn" id="playPauseBtn">
                        <svg id="playIcon" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg id="pauseIcon" viewBox="0 0 24 24" class="hidden">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                    <div class="player-info">
                        <div class="player-title">Radio Amigos</div>
                    </div>
                </div>
                <div class="volume-control">
                    <svg class="volume-icon" viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
                </div>
            </div>
        </div>
    </div>

    <audio id="radioPlayer" preload="none">
        <source src="https://myradio.live/listen/redamigos/radio.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Config
        const XAT_API_KEY = '2fa67b290170eaaa';
        
        const CHAT_CONFIG = {
            id: '219104257',
            groupName: 'puntodeencuentro2026'
        };

        const RADIO_CONFIG = {
            streamUrl: 'https://myradio.live/listen/redamigos/radio.mp3',
            apiUrl: 'https://myradio.live/api/nowplaying/redamigos',
            updateInterval: 20000
        };

        // State
        let chatConnected = false;
        let isPlaying = false;
        let metadataInterval = null;

        // Elements
        const connectBtn = document.getElementById('connectBtn');
        const chatFrame = document.getElementById('chatFrame');
        const chatContent = document.getElementById('chatContent');
        const chatPlaceholder = document.getElementById('chatPlaceholder');
        const nowPlayingEl = document.getElementById('nowPlaying');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const radioPlayer = document.getElementById('radioPlayer');

        // Chat Functions
        function buildChatUrl() {
            return `https://xat.com/embed/chat.php#id=${CHAT_CONFIG.id}&gn=${CHAT_CONFIG.groupName}&k=${XAT_API_KEY}`;
        }

        function connectChat() {
            const url = buildChatUrl();
            chatFrame.src = url;
            chatFrame.style.display = 'block';
            chatPlaceholder.style.display = 'none';
            connectBtn.textContent = 'Desconectar';
            connectBtn.classList.add('btn-danger');
            chatConnected = true;
        }

        function disconnectChat() {
            chatFrame.src = '';
            chatFrame.style.display = 'none';
            chatPlaceholder.style.display = 'block';
            connectBtn.textContent = 'Conectar al Chat';
            connectBtn.classList.remove('btn-danger');
            chatConnected = false;
        }

        function toggleChatConnection() {
            if (chatConnected) {
                disconnectChat();
            } else {
                connectChat();
            }
        }

        // Radio Functions
        function togglePlayPause() {
            if (isPlaying) {
                radioPlayer.pause();
                isPlaying = false;
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            } else {
                radioPlayer.play().then(() => {
                    isPlaying = true;
                    playIcon.classList.add('hidden');
                    pauseIcon.classList.remove('hidden');
                }).catch(err => {
                    console.error('Error al reproducir:', err);
                });
            }
        }

        function updateVolume() {
            radioPlayer.volume = volumeSlider.value / 100;
        }

        async function updateNowPlaying() {
            try {
                const response = await fetch(RADIO_CONFIG.apiUrl);
                const data = await response.json();
                
                if (data.now_playing && data.now_playing.song) {
                    const artist = data.now_playing.song.artist || 'Desconocido';
                    const title = data.now_playing.song.title || 'Sin título';
                    
                    nowPlayingEl.innerHTML = `
                        <div class="track-artist">${escapeHtml(artist)}</div>
                        <div class="track-title">${escapeHtml(title)}</div>
                    `;
                } else {
                    nowPlayingEl.innerHTML = `
                        <div class="track-artist">Sin información</div>
                        <div class="track-title">Radio RedAmigos</div>
                    `;
                }
            } catch (err) {
                console.error('Error al obtener metadata:', err);
                nowPlayingEl.innerHTML = `
                    <div class="track-artist">Error de conexión</div>
                    <div class="track-title">Reintentando...</div>
                `;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event Listeners
        connectBtn.addEventListener('click', toggleChatConnection);
        playPauseBtn.addEventListener('click', togglePlayPause);
        volumeSlider.addEventListener('input', updateVolume);

        radioPlayer.addEventListener('play', () => {
            isPlaying = true;
            playIcon.classList.add('hidden');
            pauseIcon.classList.remove('hidden');
        });

        radioPlayer.addEventListener('pause', () => {
            isPlaying = false;
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
        });

        // Init
        updateVolume();
        updateNowPlaying();
        metadataInterval = setInterval(updateNowPlaying, RADIO_CONFIG.updateInterval);

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (metadataInterval) clearInterval(metadataInterval);
        });
    </script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>

</body>
</html>
