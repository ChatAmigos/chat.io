<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioChat Amigos Chile</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * {
        font-family: 'Inter', sans-serif;
        box-sizing: border-box;
    }
    
    body {
        background: #0A0A0B;
        color: #E4E4E7;
        overflow: hidden;
    }
    
    .glass-card {
        background: rgba(20, 20, 22, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .glass-button {
        background: linear-gradient(135deg, rgba(139, 92, 246, 0.8) 0%, rgba(124, 58, 237, 0.8) 100%);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(167, 139, 250, 0.3);
        box-shadow: 0 8px 32px 0 rgba(139, 92, 246, 0.37);
        transition: all 0.3s ease;
    }
    
    .glass-button:hover {
        background: linear-gradient(135deg, rgba(139, 92, 246, 0.9) 0%, rgba(124, 58, 237, 0.9) 100%);
        box-shadow: 0 8px 32px 0 rgba(139, 92, 246, 0.5);
        transform: translateY(-2px);
    }
    
    .glass-button:active {
        transform: translateY(0);
    }
    
    .radio-btn {
        background: rgba(39, 39, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.2s ease;
    }
    
    .radio-btn:hover {
        background: rgba(63, 63, 70, 0.9);
        border-color: rgba(167, 139, 250, 0.5);
    }
    
    .radio-btn:active {
        transform: scale(0.95);
    }
    
    input[type="range"] {
        -webkit-appearance: none;
        background: rgba(39, 39, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        height: 6px;
        border-radius: 3px;
    }
    
    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        background: linear-gradient(135deg, #8B5CF6, #7C3AED);
        cursor: pointer;
        border-radius: 50%;
        border: 2px solid #E4E4E7;
        box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
    }
    
    input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        background: linear-gradient(135deg, #8B5CF6, #7C3AED);
        cursor: pointer;
        border-radius: 50%;
        border: 2px solid #E4E4E7;
        box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
    }
    
    .pulse-animation {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }
    
    .fade-in {
        animation: fadeIn 0.5s ease-in;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
    
    @media (max-width: 768px) {
        .main-layout {
            flex-direction: column;
        }
        .chat-section {
            width: 100% !important;
            height: 60%;
        }
        .radio-section {
            width: 100% !important;
            height: 40%;
        }
    }
</style>
</head>
<body class="h-screen flex flex-col">
    <!-- Header -->
    <header class="glass-card border-b border-white/10 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
            </div>
            <h1 class="text-lg font-bold text-white">Chat Amigos Chile</h1>
        </div>
        <div class="text-xs text-zinc-400 hidden md:block">Radio Chat Amigos</div>
    </header>
    
    <!-- Main Layout -->
    <div class="main-layout flex flex-1 overflow-hidden">
        <!-- Chat Section 70% -->
        <div class="chat-section w-[70%] border-r border-white/10 bg-[#0A0A0B] relative">
            <!-- Conectar Button State -->
            <div id="connectState" class="absolute inset-0 flex items-center justify-center bg-[#0A0A0B] z-10">
                <div class="text-center space-y-6 px-4">
                    <div class="space-y-2">
                        <h2 class="text-2xl md:text-3xl font-bold text-white">Bienvenido al Chat</h2>
                        <p class="text-zinc-400 text-sm md:text-base">Conecta con la comunidad Chat Amigos Chile</p>
                    </div>
                    <button id="connectBtn" class="glass-button px-12 py-4 rounded-2xl text-white font-semibold text-lg md:text-xl mx-auto block">
                        Conectar
                    </button>
                </div>
            </div>
            
            <!-- Xat Iframe -->
            <div id="chatFrame" class="w-full h-full hidden">
                <iframe 
                    id="xatIframe"
                    width="100%" 
                    height="100%" 
                    frameborder="0" 
                    scrolling="no"
                    title="Chat de xat.com">
                </iframe>
            </div>
        </div>
        
        <!-- Radio Section 30% -->
        <div class="radio-section w-[30%] bg-[#0A0A0B] flex flex-col p-4 md:p-6 gap-4">
            <!-- Metadata Section -->
            <div class="glass-card rounded-xl p-4 md:p-5">
                <div class="text-xs font-medium text-zinc-500 mb-2 uppercase tracking-wider">Ahora Suena</div>
                <div id="songInfo" class="text-white font-semibold text-base md:text-lg leading-tight min-h-[48px] flex items-center">
                    <span class="text-zinc-500">Conectando...</span>
                </div>
                <div class="flex items-center gap-2 mt-3">
                    <div id="liveIndicator" class="w-2 h-2 rounded-full bg-zinc-600"></div>
                    <span id="liveText" class="text-xs text-zinc-500">Offline</span>
                </div>
            </div>
            
            <!-- Player Section -->
            <div class="glass-card rounded-xl p-6 md:p-8 flex-1 flex flex-col justify-center gap-6">
                <div class="text-center">
                    <h3 class="text-xl md:text-2xl font-bold text-white mb-1">Radio Amigos</h3>
                    <p class="text-xs text-zinc-500">MP3 128kbps</p>
                </div>
                
                <!-- Play/Pause Button -->
                <button id="playPauseBtn" class="radio-btn w-20 h-20 md:w-24 md:h-24 rounded-full mx-auto flex items-center justify-center group">
                    <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 md:h-12 md:w-12 text-white group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg id="pauseIcon" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 md:h-12 md:w-12 text-white group-hover:scale-110 transition-transform hidden" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                    </svg>
                </button>
                
                <!-- Volume Slider -->
                <div class="space-y-2 px-2">
                    <div class="flex items-center justify-between text-xs text-zinc-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                        <span id="volumeText">70%</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </div>
                    <input 
                        type="range" 
                        id="volumeSlider" 
                        min="0" 
                        max="100" 
                        value="70" 
                        class="w-full"
                    >
                </div>
            </div>
        </div>
    </div>
    
    <audio id="radioStream" preload="none">
        <source src="https://myradio.live/listen/redamigos/radio.mp3" type="audio/mpeg">
    </audio>

<script>
    // Elements
    const connectBtn = document.getElementById('connectBtn');
    const connectState = document.getElementById('connectState');
    const chatFrame = document.getElementById('chatFrame');
    const xatIframe = document.getElementById('xatIframe');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeText = document.getElementById('volumeText');
    const radioStream = document.getElementById('radioStream');
    const songInfo = document.getElementById('songInfo');
    const liveIndicator = document.getElementById('liveIndicator');
    const liveText = document.getElementById('liveText');
    
    let isPlaying = false;
    let metadataInterval = null;
    
    // Conectar Xat
    connectBtn.addEventListener('click', () => {
        xatIframe.src = 'https://xat.com/embed/chat.php#id=220362270&gn=puntodeencuentro2026';
        connectState.classList.add('hidden');
        chatFrame.classList.remove('hidden');
        chatFrame.classList.add('fade-in');
    });
    
    // Radio Play/Pause
    playPauseBtn.addEventListener('click', () => {
        if (!isPlaying) {
            radioStream.play().then(() => {
                isPlaying = true;
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                startMetadata();
            }).catch(err => {
                console.error('Error al reproducir:', err);
                songInfo.innerHTML = '<span class="text-red-400">Error al conectar</span>';
            });
        } else {
            radioStream.pause();
            isPlaying = false;
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            stopMetadata();
        }
    });
    
    // Volume Control
    volumeSlider.addEventListener('input', (e) => {
        const vol = e.target.value;
        radioStream.volume = vol / 100;
        volumeText.textContent = vol + '%';
    });
    
    radioStream.volume = 0.7;
    
    radioStream.addEventListener('playing', () => {
        liveIndicator.classList.remove('bg-zinc-600');
        liveIndicator.classList.add('bg-green-500', 'pulse-animation');
        liveText.textContent = 'En Vivo';
        liveText.classList.remove('text-zinc-500');
        liveText.classList.add('text-green-500');
    });
    
    radioStream.addEventListener('pause', () => {
        liveIndicator.classList.add('bg-zinc-600');
        liveIndicator.classList.remove('bg-green-500', 'pulse-animation');
        liveText.textContent = 'Pausado';
        liveText.classList.add('text-zinc-500');
        liveText.classList.remove('text-green-500');
    });
    
    radioStream.addEventListener('error', () => {
        liveIndicator.classList.add('bg-zinc-600');
        liveIndicator.classList.remove('bg-green-500', 'pulse-animation');
        liveText.textContent = 'Error';
        songInfo.innerHTML = '<span class="text-red-400">Stream no disponible</span>';
    });
    
    // Metadata Fetch
    async function fetchMetadata() {
        try {
            const response = await fetch('https://myradio.live/api/nowplaying/redamigos');
            if (!response.ok) throw new Error('Network error');
            
            const data = await response.json();
            const artist = data?.now_playing?.song?.artist || data?.artist || 'Artista Desconocido';
            const title = data?.now_playing?.song?.title || data?.title || 'Título Desconocido';
            
            songInfo.innerHTML = `<span>${artist}</span><br><span class="text-zinc-400 text-sm">${title}</span>`;
        } catch (err) {
            console.warn('Metadata error:', err);
            songInfo.innerHTML = '<span class="text-zinc-500">Radio RedAmigos</span>';
        }
    }
    
    function startMetadata() {
        fetchMetadata();
        metadataInterval = setInterval(fetchMetadata, 20000);
    }
    
    function stopMetadata() {
        if (metadataInterval) {
            clearInterval(metadataInterval);
            metadataInterval = null;
        }
        songInfo.innerHTML = '<span class="text-zinc-500">Presiona play para escuchar</span>';
    }
    
    // Init
    stopMetadata();
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
