<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioChatAmigosChile</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
    
    :root {
        --bg-dark: #0A0A0B;
        --bg-card: #121214;
        --bg-hover: #1a1a1d;
        --accent: #8b5cf6;
        --accent-hover: #7c3aed;
        --accent-glow: rgba(139, 92, 246, 0.3);
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --border: #2a2a2f;
        --success: #10b981;
        --danger: #ef4444;
    }
    
    * {
        font-family: 'Outfit', sans-serif;
        box-sizing: border-box;
    }
    
    .mono {
        font-family: 'JetBrains Mono', monospace;
    }
    
    body {
        background: var(--bg-dark);
        color: var(--text-primary);
        overflow: hidden;
    }
    
    .glass {
        background: rgba(18, 18, 20, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(139, 92, 246, 0.2);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    
    .glass-strong {
        background: rgba(18, 18, 20, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(139, 92, 246, 0.25);
        box-shadow: 0 8px 32px rgba(139, 92, 246, 0.15);
    }
    
    .irc-window {
        background: var(--bg-dark);
    }
    
    .irc-header {
        background: linear-gradient(135deg, #1a1a1d 0%, #0A0A0B 100%);
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(10px);
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
        50% { box-shadow: 0 0 35px var(--accent-glow), 0 0 50px var(--accent-glow); }
    }
    
    .connect-btn {
        background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
        border: 1px solid rgba(139, 92, 246, 0.4);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        animation: pulse-glow 2.5s ease-in-out infinite;
    }
    
    .connect-btn:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 0 40px var(--accent-glow), 0 8px 24px rgba(139, 92, 246, 0.4);
    }
    
    .connect-btn:active {
        transform: translateY(0) scale(0.98);
    }
    
    .radio-panel {
        background: var(--bg-card);
        border-left: 1px solid var(--border);
    }
    
    .metadata-display {
        background: rgba(139, 92, 246, 0.05);
        border: 1px solid rgba(139, 92, 246, 0.15);
        border-radius: 12px;
        padding: 16px;
        transition: all 0.3s ease;
    }
    
    .radio-control-btn {
        background: var(--bg-hover);
        border: 1px solid var(--border);
        color: var(--text-primary);
        transition: all 0.2s;
        border-radius: 10px;
        font-weight: 600;
    }
    
    .radio-control-btn:hover {
        background: var(--accent);
        border-color: var(--accent);
        box-shadow: 0 0 20px var(--accent-glow);
        transform: translateY(-1px);
    }
    
    .radio-control-btn:active {
        transform: scale(0.96);
    }
    
    .radio-control-btn.active {
        background: var(--accent);
        border-color: var(--accent);
    }
    
    input[type="range"] {
        -webkit-appearance: none;
        background: var(--bg-hover);
        border: 1px solid var(--border);
        height: 6px;
        border-radius: 3px;
    }
    
    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        background: var(--accent);
        cursor: pointer;
        border-radius: 50%;
        box-shadow: 0 0 12px var(--accent-glow);
        transition: all 0.2s;
    }
    
    input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.3);
    }
    
    .equalizer {
        display: flex;
        gap: 3px;
        height: 20px;
        align-items: flex-end;
        justify-content: center;
    }
    
    .bar {
        width: 3px;
        background: linear-gradient(180deg, var(--accent) 0%, #6366f1 100%);
        border-radius: 2px;
        animation: eq 0.8s infinite ease-in-out alternate;
    }
    
    .bar:nth-child(1) { animation-delay: 0s; }
    .bar:nth-child(2) { animation-delay: 0.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }
    .bar:nth-child(4) { animation-delay: 0.3s; }
    .bar:nth-child(5) { animation-delay: 0.4s; }
    
    @keyframes eq {
        from { height: 4px; opacity: 0.5; }
        to { height: 20px; opacity: 1; }
    }
    
    .equalizer.paused .bar {
        animation-play-state: paused;
        height: 4px;
        opacity: 0.3;
    }
    
    .chat-area {
        width: 70%;
    }
    
    .radio-panel {
        width: 30%;
        min-width: 300px;
    }
    
    @media (max-width: 768px) {
        .main-layout {
            flex-direction: column;
        }
        .chat-area {
            width: 100% !important;
            order: 1;
            min-height: 400px;
        }
        .radio-panel {
            width: 100% !important;
            border-left: none !important;
            border-top: 1px solid var(--border);
            order: 2;
            max-height: 320px;
            min-width: unset;
        }
        .irc-header h1 {
            font-size: 13px;
        }
    }
</style>
</head>
<body class="h-screen flex flex-col">
    <div class="irc-window flex flex-col h-full">
        <!-- Header -->
        <div class="irc-header px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center shadow-lg shadow-violet-500/30">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3 .895 3 2zM9 10l12-3"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-sm md:text-base font-bold text-white">Chat Amigos Chile</h1>
                    <p class="text-xs text-slate-400 mono">Sala #Punto_de_Encuentro</p>
                </div>
            </div>
            <div class="flex items-center gap-3 text-xs">
                <div id="connectionStatus" class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-lg glass border border-slate-700/50">
                    <div id="connectionDot" class="w-2 h-2 rounded-full bg-slate-500"></div>
                    <span class="text-slate-300">Desconectado</span>
                </div>
            </div>
        </div>
        
        <!-- Main Layout -->
        <div class="main-layout flex flex-1 overflow-hidden">
            <!-- Chat Area 70% -->
            <div class="chat-area flex flex-col min-w-0 bg-[#0A0A0B]">
                <!-- Pre-connect Screen -->
                <div id="connectScreen" class="flex-1 flex items-center justify-center p-6">
                    <div class="text-center max-w-md">
                        <div class="glass-strong rounded-2xl p-8 md:p-10">
                            <div class="w-20 h-20 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center shadow-lg shadow-violet-500/50">
                                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                                </svg>
                            </div>
                            <h2 class="text-2xl md:text-3xl font-bold text-white mb-3">Chat Amigos Chile</h2>
                            <p class="text-sm text-slate-400 mb-8">Conecta con la comunidad Chat Amigos Chile</p>
                            <button id="connectBtn" class="connect-btn w-full py-4 px-8 rounded-xl text-white font-bold text-base flex items-center justify-center gap-3">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M2 5a2 2 0 012-2h7a2 2 0 012 2v4a2 2 0 01-2 2H9l-3 3v-3H4a2 2 0 01-2-2V5z"></path>
                                    <path d="M15 7v2a4 4 0 01-4 4H9.828l-1.766 1.767c.28.149.599.233.938.233h2l3 3v-3h2a2 2 0 002-2V9a2 2 0 00-2-2h-1z"></path>
                                </svg>
                                Conectar al Chat
                            </button>
                            <p class="text-xs text-slate-500 mt-4">El chat se cargará al conectar</p>
                        </div>
                    </div>
                </div>
                
                <!-- Xat Iframe Container - Hidden initially -->
                <div id="xatContainer" class="flex-1" style="display:none;">
                    <div class="bg-slate-900/50 px-4 py-2 border-b border-slate-800 text-xs font-semibold flex items-center justify-between">
                        <span class="text-slate-300 flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                            Chat Real de xat.com - En línea
                        </span>
                        <span class="text-violet-400 mono"></span>
                    </div>
                    <div id="xatIframeWrapper" class="h-[calc(100%-32px)]"></div>
                </div>
            </div>
            
            <!-- Radio Panel 30% -->
            <div class="radio-panel flex flex-col overflow-y-auto">
                <!-- Panel Header -->
                <div class="px-5 py-4 border-b border-slate-800">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"></path>
                            </svg>
                        </div>
                        <div>
                            <div class="text-sm font-bold text-white">Radio Amigos</div>
                            <div class="text-xs text-slate-400">En Directo 24/7</div>
                        </div>
                    </div>
                </div>
                
                <!-- Metadata Display - Sin carátulas -->
                <div class="p-5">
                    <div class="metadata-display">
                        <div class="text-xs text-violet-400 font-bold uppercase tracking-wider mb-3">Ahora Suena</div>
                        <div id="trackDisplay" class="text-base font-bold text-white leading-snug mb-2 min-h-[24px]">
                            Conectando...
                        </div>
                        <div id="artistDisplay" class="text-sm text-slate-300 mb-3 min-h-[20px]">
                            Radio Amigos
                        </div>
                        
                        <!-- Visualizer -->
                        <div class="flex justify-center pt-2">
                            <div class="equalizer paused" id="equalizer">
                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Controls - Solo Play/Pause + Volumen -->
                <div class="px-5 pb-5 space-y-4">
                    <div class="glass rounded-xl p-4">
                        <!-- Play/Pause -->
                        <div class="flex gap-2 mb-4">
                            <button id="playBtn" class="radio-control-btn flex-1 py-3 px-4 text-sm flex items-center justify-center gap-2">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>
                                </svg>
                                Play
                            </button>
                            <button id="pauseBtn" class="radio-control-btn flex-1 py-3 px-4 text-sm flex items-center justify-center gap-2" style="display:none;">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                                </svg>
                                Pause
                            </button>
                        </div>
                        
                        <!-- Volume -->
                        <div class="space-y-2">
                            <div class="flex items-center justify-between text-xs text-slate-400">
                                <span class="flex items-center gap-1.5">
                                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                                    </svg>
                                    Volumen
                                </span>
                                <span id="volumeDisplay" class="font-bold text-violet-400">70%</span>
                            </div>
                            <input 
                                type="range" 
                                id="volumeSlider" 
                                min="0" 
                                max="100" 
                                value="70" 
                                class="w-full"
                            >
                        </div>
                    </div>
                    
                    <!-- Station Info -->
                    <div class="glass rounded-xl p-4 text-center">
                        <div class="text-xs text-slate-500 space-y-1">
                            <div class="flex items-center justify-center gap-2">
                                <div class="w-1.5 h-1.5 rounded-full bg-violet-500"></div>
                                <span class="font-semibold text-slate-300">Radio Amigos</span>
                            </div>
                            <div class="text-[10px] text-slate-600">@BarT Corporation</div>
                        </div>
                    </div>
                </div>
                
                <audio id="radioStream" preload="none">
                    <source src="https://myradio.live/listen/redamigos/radio.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>
    </div>

<script>
    // Elements
    const connectBtn = document.getElementById('connectBtn');
    const connectScreen = document.getElementById('connectScreen');
    const xatContainer = document.getElementById('xatContainer');
    const xatIframeWrapper = document.getElementById('xatIframeWrapper');
    const connectionDot = document.getElementById('connectionDot');
    const connectionStatus = document.getElementById('connectionStatus');
    
    // Radio elements
    const radioStream = document.getElementById('radioStream');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeDisplay = document.getElementById('volumeDisplay');
    const equalizer = document.getElementById('equalizer');
    const trackDisplay = document.getElementById('trackDisplay');
    const artistDisplay = document.getElementById('artistDisplay');
    
    let isRadioPlaying = false;
    let metadataInterval = null;
    let lastTrackId = null;
    let stationId = 'redamigos';
    
    // Connect Button - Load Xat on demand
    connectBtn.addEventListener('click', () => {
        connectScreen.style.display = 'none';
        xatContainer.style.display = 'flex';
        xatContainer.style.flexDirection = 'column';
        
        // Insert iframe only when clicked
        const iframe = document.createElement('iframe');
        iframe.src = 'https://xat.com/embed/chat.php#id=220362270&gn=puntodeencuentro2026';
        iframe.width = '100%';
        iframe.height = '100%';
        iframe.frameBorder = '0';
        iframe.scrolling = 'no';
        iframe.title = 'Chat de xat.com';
        xatIframeWrapper.appendChild(iframe);
        
        // Update connection status
        connectionDot.className = 'w-2 h-2 rounded-full bg-emerald-500 animate-pulse';
        connectionStatus.querySelector('span').textContent = 'Conectado';
        
        // Auto-start radio when connecting
        if (!isRadioPlaying) {
            setTimeout(() => playBtn.click(), 500);
        }
    });
    
    // Fetch metadata from myradio.live API
    async function fetchMetadata() {
        try {
            const endpoint = `https://myradio.live/api/nowplaying/${stationId}`;
            const response = await fetch(endpoint);
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json();
            updateNowPlaying(data);
            
        } catch (error) {
            console.error('Error fetching metadata:', error);
        }
    }
    
    // Update Now Playing - Solo Artista y Título
    function updateNowPlaying(data) {
        const song = data.now_playing?.song || data.song || data;
        const currentId = song?.id || `${song?.artist}-${song?.title}`;
        
        if (currentId === lastTrackId) return;
        lastTrackId = currentId;
        
        const artist = song.artist || song.artist_name || 'Artista Desconocido';
        const title = song.title || song.song_title || song.text || 'Sin título';
        
        // Update with fade effect
        trackDisplay.style.opacity = '0';
        artistDisplay.style.opacity = '0';
        
        setTimeout(() => {
            trackDisplay.textContent = title;
            artistDisplay.textContent = artist;
            trackDisplay.style.opacity = '1';
            artistDisplay.style.opacity = '1';
        }, 200);
    }
    
    // Radio Controls
    function updateRadioUI(playing) {
        isRadioPlaying = playing;
        if (playing) {
            equalizer.classList.remove('paused');
            playBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-flex';
            
            if (!metadataInterval) {
                fetchMetadata();
                metadataInterval = setInterval(fetchMetadata, 20000);
            }
        } else {
            equalizer.classList.add('paused');
            playBtn.style.display = 'inline-flex';
            pauseBtn.style.display = 'none';
            
            if (metadataInterval) {
                clearInterval(metadataInterval);
                metadataInterval = null;
            }
        }
    }
    
    playBtn.addEventListener('click', () => {
        radioStream.play().then(() => {
            updateRadioUI(true);
        }).catch(err => {
            console.error('Error al reproducir:', err);
        });
    });
    
    pauseBtn.addEventListener('click', () => {
        radioStream.pause();
        updateRadioUI(false);
    });
    
    volumeSlider.addEventListener('input', (e) => {
        const vol = e.target.value;
        radioStream.volume = vol / 100;
        volumeDisplay.textContent = vol + '%';
    });
    
    radioStream.volume = 0.7;
    
    radioStream.addEventListener('playing', () => updateRadioUI(true));
    radioStream.addEventListener('pause', () => updateRadioUI(false));
    radioStream.addEventListener('error', () => updateRadioUI(false));
    
    // Smooth transitions
    trackDisplay.style.transition = 'opacity 0.3s ease';
    artistDisplay.style.transition = 'opacity 0.3s ease';
</script>

</body>
</html>
